<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Food - доставка їжі</title>
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
    <link rel="manifest" href="images/favicon/site.webmanifest">
    <link rel="mask-icon" href="images/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="css/style.min.css">
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header__top">
            <nav class="menu">
              <a class="logo header__logo" href="#">
                <img class="logo__img" src="images/logo.svg" width="200" height="39" alt="Логотип сайту">
              </a>
              <ul class="menu__items">
                <li class="menu__item">
                  <a class="menu__link menu__link--active animation" href="#">Головна</a>
                </li>
                <li class="menu__item">
                  <a class="menu__link animation" href="#">Страви</a>
                </li>
                <li class="menu__item">
                  <a class="menu__link animation" href="#">Контакти</a>
                </li>
              </ul>
              <ul class="user__services">
                <li class="user__item">
                  <button class="user__btn" type="button">
                    <svg class="user__btn-icon">
                      <use xlink:href="images/sprite.svg#search-icon"></use>
                  </svg>
                    <span class="sr-only">Пошук товару</span>
                  </button>
                </li>
                <li class="user__item">
                  <button class="user__btn user__btn--cart" type="button">
                    <svg class="user__btn-icon">
                      <use xlink:href="images/sprite.svg#cart-icon"></use>
                  </svg>
                    <span class="sr-only">Перехід до кошика із замовленням</span>
                    <span class="user__stat">4</span>
                  </button>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </header>
